<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css.css"> <title>Discover Greece | Luxury Travel</title>
</head>
<body>

    <header class="banner">
        <div class="container">
            <h1>Discover Greece 🇬🇷</h1>
            <p>Experience the magic of the Mediterranean</p>
            <a href="#reservation" class="btn-primary">Book your dream trip</a>
        </div>
    </header>

    <main class="container">
        <section class="destinations">
            <h2 class="section-title">Our Popular Destinations</h2>
            <div class="cards-grid">
                <div class="card" onclick="showInfo('mykonos')">
                    <div class="card-img-container">
                        <img src="mykonos.jpg" alt="Mykonos">
                    </div>
                    <div class="card-content">
                        <h3>Mykonos</h3>
                        <span class="badge">Trendy</span>
                    </div>
                </div>

                <div class="card" onclick="showInfo('santorini')">
                    <div class="card-img-container">
                        <img src="santorin.jpg" alt="Santorini">
                    </div>
                    <div class="card-content">
                        <h3>Santorini</h3>
                        <span class="badge">Romantic</span>
                    </div>
                </div>
            </div>
        </section>

        <section id="info-section" class="hidden">
            <div class="info-card">
                <h2 id="city-title"></h2>
                <p id="city-text"></p>
                <img id="city-img" src="" alt="Selected city">
            </div>
        </section>

        <section id="reservation" class="booking-section">
            <div class="form-container">
                <h2>Book your trip ✈️</h2>
                <form class="booking-form">
                    <input type="text" placeholder="Your name" required>
                    <input type="email" placeholder="Your email" required>
                    <select>
                        <option value="mykonos">Mykonos</option>
                        <option value="santorini">Santorini</option>
                    </select>
                    <button type="submit" class="btn-submit">Confirm Booking</button>
                </form>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
</html>
